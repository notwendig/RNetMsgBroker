name: CMake

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev qt6-tools-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Smoke test
        run: |
          ./build/RNetMsgBrokerTest --version
          ./build/RNetMsgBrokerTest -d testdata/candump_sample.txt --full -o candump_sample.csv
          test -s candump_sample.csv
