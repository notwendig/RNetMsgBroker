name: CMake

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev qt6-tools-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Smoke test
        run: |
          ./build/RNetMsgBrokerTest --version
          test "$(./build/RNetMsgBrokerTest --libversion)" = "1.0.1"
          ./build/RNetMsgBrokerTest -d testdata/candump_sample.txt --full -o candump_sample.csv
          test -s candump_sample.csv
          ! grep -q 'UNKNOWN ' candump_sample.csv

      - name: Delivery archive
        run: cmake --build build --target deliver

      - name: Upload delivery archive
        uses: actions/upload-artifact@v4
        with:
          name: RNetMsgBroker_v1.0.1
          path: build/RNetMsgBroker_v1.0.1.zip
